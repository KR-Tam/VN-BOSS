<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VN Boss · 관리자</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .admin-wrap { max-width: 960px; margin: 0 auto; padding: 32px 20px 80px; }
    .admin-gate { max-width: 420px; margin: 80px auto; text-align: center; }
    .admin-gate input { width: 100%; padding: 10px 12px; margin: 12px 0; border: 1px solid #d0d5dd; border-radius: 8px; }
    .admin-section { margin-top: 36px; }
    .admin-section h2 { margin-bottom: 4px; }
    .admin-meta { color: #667085; font-size: 13px; margin-bottom: 12px; }
    table.admin-table { width: 100%; border-collapse: collapse; font-size: 14px; }
    table.admin-table th, table.admin-table td { text-align: left; padding: 8px 10px; border-bottom: 1px solid #eaecf0; vertical-align: top; }
    table.admin-table th { color: #667085; font-weight: 600; font-size: 12px; text-transform: uppercase; }
    .admin-table button { padding: 4px 10px; font-size: 12px; border-radius: 6px; border: 1px solid #d0d5dd; background: #fff; cursor: pointer; }
    .admin-table button:hover { background: #f2f4f7; }
    .admin-refresh { padding: 6px 14px; border-radius: 6px; border: 1px solid #d0d5dd; background: #fff; cursor: pointer; font-size: 13px; }
    .admin-empty { color: #98a2b3; font-size: 13px; padding: 12px 0; }
    .admin-logout { float: right; font-size: 12px; color: #98a2b3; background: none; border: none; cursor: pointer; }
  </style>
</head>
<body>
  <header class="site-header">
    <nav class="nav">
      <a class="brand" href="index.html"><span class="brand-mark">VN</span><span>VN Boss</span></a>
      <div class="nav-links"><a href="index.html">메인으로</a></div>
    </nav>
  </header>

  <main class="admin-wrap">
    <div id="adminGate" class="admin-gate">
      <p class="eyebrow">관리자 전용</p>
      <h1>관리자 인증</h1>
      <p>Cloudflare Worker에 설정한 ADMIN_SECRET 값을 입력하세요.</p>
      <input id="adminSecretInput" type="password" placeholder="관리자 비밀키" autocomplete="off">
      <button class="auth-button" id="adminLoginButton" type="button">입장</button>
      <p id="adminGateStatus" class="admin-meta"></p>
    </div>

    <div id="adminDashboard" style="display:none;">
      <button class="admin-logout" id="adminLogoutButton" type="button">로그아웃</button>
      <p class="eyebrow">VN Boss 관리자</p>
      <h1>회원 / 사용량 / 오류 로그</h1>

      <section class="admin-section">
        <h2>가입 회원 (Firebase Google 로그인 기준)</h2>
        <p class="admin-meta">서버가 요청을 받을 때마다 회원 정보를 기록합니다. 아직 한 번도 메시지 생성을 시도하지 않은 회원은 표시되지 않을 수 있습니다.</p>
        <button class="admin-refresh" id="refreshMembers" type="button">새로고침</button>
        <div id="membersTableWrap"></div>
      </section>

      <section class="admin-section">
        <h2>최근 오류 로그</h2>
        <p class="admin-meta">메시지 생성 호출 실패 기록 (최근 20건)</p>
        <button class="admin-refresh" id="refreshErrors" type="button">새로고침</button>
        <div id="errorsTableWrap"></div>
      </section>
    </div>
  </main>

  <script src="config.js"></script>
  <script src="admin.js"></script>
</body>
</html>
